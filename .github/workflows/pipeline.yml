name: Pipeline de Seguridad CI/CD

on:
  push:
    branches: ['**']          # en todos los pushes
  pull_request:
    branches: [main]          # en PRs hacia main

jobs:
  # ── ETAPA 1: LINT ──────────────────────────────────────
  lint:
    name: Linting (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install flake8
      - run: flake8 . --max-line-length=120 --exclude=.git,__pycache__,Original/

  # ── ETAPA 2: TESTS ─────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt pytest pytest-cov
      - run: pytest --cov=. --cov-report=xml --cov-fail-under=80 --exclude=.git,__pycache__,Original/

  # ── ETAPA 3: SAST (SEGURIDAD) ──────────────────────────
  security-sast:
    name: Análisis SAST (Bandit)
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'pull_request'  # solo en PRs a main
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Bandit
        run: pip install bandit[toml]

      - name: Ejecutar análisis de seguridad con Bandit
        run: |
          bandit -r . \
            --exclude .git,__pycache__,tests \
            --severity-level medium \
            --confidence-level medium \
            --format json \
            --output bandit-report.json \
            --exit-zero
          bandit -r . \
            --exclude .git,__pycache__,tests \
            --severity-level medium \
            --format txt

      - name: Subir reporte como artefacto
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json

  # ── ETAPA 4: DEPENDENCIAS ──────────────────────────────
  dependency-check:
    name: Vulnerabilidades en dependencias (pip-audit)
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pip-audit
      - run: pip-audit --requirement requirements.txt --format json

  # ── ETAPA 5: SECRETOS ──────────────────────────────────
  secret-scan:
    name: Detección de secretos (detect-secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # historial completo para detectar secretos pasados
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install detect-secrets
      - run: |
          detect-secrets scan > .secrets.baseline --exclude=.git,__pycache__,Original/ 
          detect-secrets audit .secrets.baseline --exclude=.git,__pycache__,Original/

  # ── ETAPA 6: DEPLOY (solo si todo pasa) ────────────────
  deploy:
    name: Deploy a producción
    runs-on: ubuntu-latest
    needs: [test, security-sast, dependency-check, secret-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        run: echo 'Desplegando a producción (todos los checks han pasado)...'