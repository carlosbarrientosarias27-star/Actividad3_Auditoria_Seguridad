name: Pipeline de Seguridad CI/CD

on:
  push:
    branches: ['**']          # en todos los pushes
  pull_request:
    branches: [main]          # en PRs hacia main

jobs:
  # ── ETAPA 1: LINT ──────────────────────────────────────
  lint:
    name: Linting (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install flake8
      - run: flake8 Seguro/ --max-line-length=120

  # ── ETAPA 2: TESTS ─────────────────────────────────────
  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt pytest pytest-cov
      - run: pytest Seguro/ --cov=Seguro --cov-report=xml --cov-fail-under=80

# ── ETAPA 3: SAST (SEGURIDAD) ──────────────────────────
  security-sast:
    name: Análisis SAST (Bandit)
    runs-on: ubuntu-latest
    needs: [lint, test]
    # Eliminamos el IF restrictivo para que siempre analice la seguridad
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar Bandit
        run: pip install bandit[toml]
      - name: Ejecutar análisis de seguridad
        run: bandit -r Seguro/ --severity-level medium --format txt

  # ── ETAPA 4: DEPENDENCIAS ──────────────────────────────
  dependency-check:
    name: Vulnerabilidades en dependencias (pip-audit)
    runs-on: ubuntu-latest
    needs: lint
    # Eliminamos el IF restrictivo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pip-audit
      - run: pip-audit --requirement requirements.txt

  # ── ETAPA 5: SECRETOS ──────────────────────────────────
  secret-scan:
    name: Detección de secretos (detect-secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install detect-secrets
      - run: detect-secrets scan Seguro/ --exclude-files '\.git|__pycache__' > .secrets.baseline

  # ── ETAPA 6: DEPLOY ────────────────────────────────────
  deploy:
    name: Deploy a producción
    runs-on: ubuntu-latest
    needs: [test, security-sast, dependency-check, secret-scan]
    # Solo despliega si estamos en la rama main (sea por push o por merge de PR)
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        run: echo 'Desplegando a producción (todos los checks han pasado)...'